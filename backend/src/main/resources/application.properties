# =============================================
# SERVER
# =============================================
server.port=8080
server.servlet.context-path=/api

# =============================================
# DATABASE - PostgreSQL RDS
# =============================================
spring.datasource.url=jdbc:postgresql://pathfinder-db.cq1oasqo6mup.us-east-1.rds.amazonaws.com:5432/pathfinder_dev
spring.datasource.username=pathfinder_dev
spring.datasource.password=Pathfinder2026!
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT
# =============================================
app.jwt.secret=pathfinder-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
app.jwt.expiration-ms=86400000

# =============================================
# OAUTH2 - GOOGLE
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/api/oauth2/callback/{registrationId}

# =============================================
# OAUTH2 REDIRECT
# =============================================
app.oauth2.authorized-redirect-uris=http://localhost:3000/oauth2/redirect,http://3.81.58.101/oauth2/redirect
