version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    restart: always
